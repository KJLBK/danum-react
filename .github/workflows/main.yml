name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get install openssh-client -y

      - name: Prepare SSH
        run: mkdir -p ~/.ssh && chmod 700 ~/.ssh

      - name: Resolve IP address (optional)
        run: nslookup ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure SSH known hosts
        run: ssh-keyscan -t rsa <IP_ADDRESS> >> ~/.ssh/known_hosts
        env:
          IP_ADDRESS: ${{ secrets.VITE_API_BASE_URL }}  # Use IP address directly or resolve to IP in this step

      - name: Deploy code to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/danum-frontend
            git pull origin main
            npm ci
            npm run build
